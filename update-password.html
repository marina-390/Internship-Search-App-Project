<link rel="stylesheet" href="css/style.css">
<div class="auth-container" style="max-width: 400px; margin: 50px auto; text-align: center; font-family: sans-serif;">
    <h2 style="color: #4f46e5;">Create New Password</h2>
    <p style="color: #666; font-size: 0.9rem;">Please enter your new password twice.</p>
    
    <div style="margin-bottom: 15px;">
        <input type="password" id="newPassword" placeholder="New Password" 
               style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
    </div>
    
    <div style="margin-bottom: 20px;">
        <input type="password" id="confirmPassword" placeholder="Confirm New Password" 
               style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
    </div>
    
    <button onclick="updatePassword()" 
            style="width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 5px; cursor: pointer;">
        Save & Return to Login
    </button>
    
    <p id="errorMsg" style="color: red; font-size: 0.8rem; margin-top: 10px; display: none;"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/script.js"></script>
  <script src="js/cookie-consent.js"></script>

<script>
async function updatePassword() {
    const pass1 = document.getElementById('newPassword').value;
    const pass2 = document.getElementById('confirmPassword').value;

    // 1. Validation
    if (pass1.length < 8) {
        showError("Password must be at least 8 characters.");
        return;
    }
    if (pass1 !== pass2) {
        showError("Passwords do not match!");
        return;
    }

    try {
        // STEP A: Update the "Secret" Supabase Auth password
        const { data, error: authError } = await supabaseClient.auth.updateUser({
            password: pass1
        });

        if (authError) throw authError;

        // STEP B: Update your visible 'Users' table
        const userEmail = data.user.email;
        
        // Hash the password so it's secure in your table
        const salt = dcodeIO.bcrypt.genSaltSync(10);
        const hashedPassword = dcodeIO.bcrypt.hashSync(pass1, salt);

        const { error: dbError } = await supabaseClient
            .from('Users') // Make sure your table is named exactly 'Users'
            .update({ user_password: hashedPassword })
            .eq('user_login', userEmail);

        if (dbError) throw dbError;

        // STEP C: Success
        showToast("Password updated successfully!", 'success');
        await supabaseClient.auth.signOut();
        setTimeout(() => window.location.replace('auth.html'), 1500);

    } catch (error) {
        console.error("Error:", error.message);
        showError(error.message);
    }
}
</script>
