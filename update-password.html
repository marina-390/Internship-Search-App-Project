<!--
  ============================================================
  update-password.html — Password reset / new password form
  Salasanan päivityssivu — käyttäjä ohjataan tänne sähköpostissa lähetetyn palautuslinkin kautta
  ============================================================
-->
<!-- EN: This page is a standalone fragment (no <html>/<head>/<body> tags) — it is accessed
         via the Supabase password-reset email link. The user arrives here already authenticated
         (Supabase sets a short-lived session from the reset token in the URL).
         updatePassword() in the inline script:
           Step A — calls supabaseClient.auth.updateUser({ password }) to update the Supabase Auth password.
           Step B — hashes the new password with bcryptjs and updates the user_password column in the Users table.
           Step C — signs the user out and redirects to auth.html after 1.5 s.
     FI: Tämä sivu on itsenäinen fragmentti (ilman <html>/<head>/<body> -tageja) — se avataan
         Supabasen salasanan palautuslinkin kautta. Käyttäjä saapuu tänne jo autentikoituna
         (Supabase asettaa lyhytaikaisen istunnon URL:n palautustokenista).
         updatePassword() inline-skriptissä:
           Vaihe A — kutsuu supabaseClient.auth.updateUser({ password }) Supabase Auth -salasanan päivittämiseksi.
           Vaihe B — hajautaa uuden salasanan bcryptjs:llä ja päivittää user_password-sarakkeen Users-taulussa.
           Vaihe C — kirjaa käyttäjän ulos ja ohjaa auth.html:ään 1,5 s kuluttua. -->
<link rel="stylesheet" href="css/style.css">
<!-- EN: .auth-container class reuses the auth page layout style for visual consistency -->
<!-- FI: .auth-container-luokka käyttää uudelleen auth-sivun asettelutyyliä visuaalisen yhdenmukaisuuden vuoksi -->
<div class="auth-container" style="max-width: 400px; margin: 50px auto; text-align: center; font-family: sans-serif;">
    <h2 style="color: #4f46e5;">Create New Password</h2>
    <p style="color: #666; font-size: 0.9rem;">Please enter your new password twice.</p>
    
    <div style="margin-bottom: 15px;">
        <input type="password" id="newPassword" placeholder="New Password" 
               style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
    </div>
    
    <div style="margin-bottom: 20px;">
        <input type="password" id="confirmPassword" placeholder="Confirm New Password" 
               style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
    </div>
    
    <button onclick="updatePassword()" 
            style="width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 5px; cursor: pointer;">
        Save & Return to Login
    </button>
    
    <p id="errorMsg" style="color: red; font-size: 0.8rem; margin-top: 10px; display: none;"></p>

<!-- ── SCRIPTS ──────────────────────────────────────────
     EN: 1. supabase-js CDN  — Supabase client library
         2. bcryptjs CDN     — client-side password hashing (used to store hash in Users table)
         3. js/supabase.js   — initialises supabaseClient
         4. js/script.js     — provides showToast() for success/error feedback
         5. js/cookie-consent.js — GDPR cookie banner
         6. Inline script    — defines updatePassword() which executes the 3-step reset flow
     FI: 1. supabase-js CDN  — Supabase-asiakaskirjasto
         2. bcryptjs CDN     — asiakaspuolen salasanan hajautus (hash tallennetaan Users-tauluun)
         3. js/supabase.js   — alustaa supabaseClient:n
         4. js/script.js     — tarjoaa showToast()-funktion palaute-ilmoituksille
         5. js/cookie-consent.js — GDPR-evästeikkuna
         6. Inline-skripti   — määrittelee updatePassword():n joka suorittaa 3-vaiheen palautuksen
     ──────────────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/script.js"></script>
  <script src="js/cookie-consent.js"></script>

<script>
async function updatePassword() {
    const pass1 = document.getElementById('newPassword').value;
    const pass2 = document.getElementById('confirmPassword').value;

    // 1. Validation
    if (pass1.length < 8) {
        showError("Password must be at least 8 characters.");
        return;
    }
    if (pass1 !== pass2) {
        showError("Passwords do not match!");
        return;
    }

    try {
        // STEP A: Update the "Secret" Supabase Auth password
        const { data, error: authError } = await supabaseClient.auth.updateUser({
            password: pass1
        });

        if (authError) throw authError;

        // STEP B: Update your visible 'Users' table
        const userEmail = data.user.email;
        
        // Hash the password so it's secure in your table
        const salt = dcodeIO.bcrypt.genSaltSync(10);
        const hashedPassword = dcodeIO.bcrypt.hashSync(pass1, salt);

        const { error: dbError } = await supabaseClient
            .from('Users') // Make sure your table is named exactly 'Users'
            .update({ user_password: hashedPassword })
            .eq('user_login', userEmail);

        if (dbError) throw dbError;

        // STEP C: Success
        showToast("Password updated successfully!", 'success');
        await supabaseClient.auth.signOut();
        setTimeout(() => window.location.replace('auth.html'), 1500);

    } catch (error) {
        console.error("Error:", error.message);
        showError(error.message);
    }
}
</script>
