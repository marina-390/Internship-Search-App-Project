<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 54" width="210" height="54">
  <defs>
    <linearGradient id="hubLine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Connection lines -->
  <line x1="27" y1="18" x2="27" y2="11" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="35" y1="33" x2="41" y2="40" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="19" y1="33" x2="13" y2="40" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Outer nodes -->
  <circle cx="27" cy="7"  r="5" fill="#10b981"/>
  <circle cx="46" cy="44" r="5" fill="#10b981"/>
  <circle cx="8"  cy="44" r="5" fill="#10b981"/>

  <!-- Center hub -->
  <circle cx="27" cy="27" r="11" fill="#4f46e5"/>
  <circle cx="27" cy="27" r="5"  fill="white"/>

  <!-- Text: Intern -->
  <text x="64" y="34"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="22"
        font-weight="800"
        letter-spacing="-0.5"
        fill="#1f2937">Intern<tspan fill="#4f46e5">Hub</tspan></text>
</svg>
