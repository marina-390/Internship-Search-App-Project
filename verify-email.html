<!DOCTYPE html>
<!--
  ============================================================
  verify-email.html — Email verification landing page
  Sähköpostin vahvistussivu — käyttäjä ohjataan tänne rekisteröinnin vahvistuslinkin kautta
  ============================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="icon.png">
  <title>Verify Email - InternHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- ── EMAIL VERIFICATION UI ──────────────────────────────────────────
       EN: Three mutually exclusive state divs: #stateLoading (default), #stateSuccess,
           #stateError. The inline <script> listens to supabaseClient.auth.onAuthStateChange:
           when SIGNED_IN fires after clicking the email link, completeRegistration() runs.
           It checks if a Users row already exists (idempotency for double-clicks), then creates
           the Users + student_profiles or Companies + company_team rows as appropriate.
           finishSession() writes userId/userRole/userLogin to localStorage and redirects
           after 1.5 s to student-profile.html (role=1) or company-profile.html (role=2).
           A 15-second timeout shows #stateError if no SIGNED_IN event fires.
       FI: Kolme toisensa poissulkevaa tiladiv-elementtiä: #stateLoading (oletus), #stateSuccess,
           #stateError. Inline <script> kuuntelee supabaseClient.auth.onAuthStateChange:
           kun SIGNED_IN laukeaa sähköpostilinkin napsautuksen jälkeen, completeRegistration() suoritetaan.
           Se tarkistaa onko Users-rivi jo olemassa (idempotenssi tuplenapsautuksille), sitten luo
           Users + student_profiles tai Companies + company_team -rivit tarpeen mukaan.
           finishSession() kirjoittaa userId/userRole/userLogin localStorage:iin ja ohjaa
           1,5 s kuluttua student-profile.html:ään (role=1) tai company-profile.html:ään (role=2).
           15 sekunnin aikakatkaisu näyttää #stateError jos SIGNED_IN-tapahtumaa ei tule.
       ──────────────────────────────────────────────────────── -->
  <div style="max-width: 500px; margin: 100px auto; text-align: center; padding: 2rem;">

    <div id="stateLoading">
      <div style="font-size: 3rem; margin-bottom: 1rem;">⏳</div>
      <h2 style="color: #4f46e5;">Verifying your email...</h2>
      <p style="color: #666;">Please wait a moment.</p>
    </div>

    <div id="stateSuccess" style="display:none;">
      <div style="font-size: 3rem; margin-bottom: 1rem;">✅</div>
      <h2 style="color: #4f46e5;">Email confirmed!</h2>
      <p style="color: #666;">Your account is ready. Redirecting you now...</p>
    </div>

    <div id="stateError" style="display:none;">
      <div style="font-size: 3rem; margin-bottom: 1rem;">❌</div>
      <h2 style="color: #e53e3e;">Verification failed</h2>
      <p id="errorMsg" style="color: #e53e3e; margin: 1rem 0;"></p>
      <a href="auth.html" style="color: #4f46e5; text-decoration: underline;">Back to Login</a>
    </div>

  </div>

  <!-- ── SCRIPTS ──────────────────────────────────────────
       EN: 1. supabase-js CDN — Supabase client library (must load first)
           2. js/supabase.js  — initialises supabaseClient (needed for auth state and DB calls)
           3. Inline script   — contains all verification logic (completeRegistration, finishSession,
                                showError). Kept inline for simplicity since this is a standalone page
                                with no other JS dependencies.
       FI: 1. supabase-js CDN — Supabase-asiakaskirjasto (ladattava ensin)
           2. js/supabase.js  — alustaa supabaseClient:n (tarvitaan autentikointitilalle ja DB-kutsuille)
           3. Inline-skripti  — sisältää kaiken vahvistuslogiikan (completeRegistration, finishSession,
                                showError). Pidetään inline-muodossa koska kyseessä on itsenäinen sivu
                                ilman muita JS-riippuvuuksia.
       ──────────────────────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script>
    const verifyTimeout = setTimeout(
      () => showError('Verification link expired or invalid. Please try registering again.'),
      15000
    );

    supabaseClient.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) {
        clearTimeout(verifyTimeout);
        await completeRegistration(session.user);
      }
    });

    async function completeRegistration(user) {
      try {
        // Idempotency: if user already exists (double-click on link), just log them in
        const { data: existing } = await supabaseClient
          .from('Users')
          .select('user_id, role, preferred_lang')
          .eq('user_login', user.email)
          .maybeSingle();

        if (existing) {
          await finishSession(existing.user_id, existing.role, user.email, existing.preferred_lang);
          return;
        }

        const meta = user.user_metadata;

        // Create Users table entry
        const { data: newUser, error: userError } = await supabaseClient
          .from('Users')
          .insert({
            user_login: user.email,
            user_password: meta.hashed_password,
            role: meta.role,
            preferred_lang: meta.preferred_lang || 'en'
          })
          .select('user_id')
          .single();

        if (userError) throw userError;

        if (meta.role === 1) {
          // Student profile
          const { error: profileError } = await supabaseClient
            .from('student_profiles')
            .insert({
              user_id: newUser.user_id,
              first_name: meta.first_name,
              last_name: meta.last_name,
              type_education: meta.edu_level || null
            });
          if (profileError) throw profileError;

        } else if (meta.role === 2) {
          // Company entry
          const { data: newCompany, error: compError } = await supabaseClient
            .from('Companies')
            .insert({
              user_id: newUser.user_id,
              company_name: meta.company_name,
              website: meta.website || null,
              country: meta.country,
              business_id: meta.business_id
            })
            .select('company_id')
            .single();

          if (compError) throw compError;

          // Add registering user to company team
          const { error: teamError } = await supabaseClient
            .from('company_team')
            .insert({
              company_id: newCompany.company_id,
              name: `${meta.first_name} ${meta.last_name}`,
              job_title: meta.job_title,
              email: user.email
            });

          if (teamError) console.error('Team auto-add failed:', teamError);
        }

        await finishSession(newUser.user_id, meta.role, user.email, meta.preferred_lang || 'en');

      } catch (err) {
        console.error('Registration completion error:', err);
        showError(err.message);
      }
    }

    async function finishSession(userId, role, email, lang) {
      localStorage.setItem('isLoggedIn', 'true');
      localStorage.setItem('userId', userId);
      localStorage.setItem('userRole', role);
      localStorage.setItem('userLogin', email);
      if (lang) localStorage.setItem('lang', lang);

      document.getElementById('stateLoading').style.display = 'none';
      document.getElementById('stateSuccess').style.display = 'block';

      setTimeout(() => {
        window.location.href = role === 1 ? 'student-profile.html' : 'company-profile.html';
      }, 1500);
    }

    function showError(message) {
      document.getElementById('stateLoading').style.display = 'none';
      document.getElementById('stateError').style.display = 'block';
      document.getElementById('errorMsg').textContent = message;
    }
  </script>
</body>
</html>
